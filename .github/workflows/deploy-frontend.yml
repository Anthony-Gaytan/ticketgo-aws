name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: # Permite ejecutar el workflow manualmente desde GitHub

env:
  AWS_REGION: us-east-2

permissions:
  id-token: write   # Requerido para OIDC
  contents: read    # Requerido para checkout

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ticketgo-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/ticketgo-web
        run: npm ci

      - name: Build frontend
        working-directory: frontend/ticketgo-web
        env:
          # La URL del ALB — se guarda como secreto en GitHub tras el terraform apply
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Sync build to S3
        run: |
          aws s3 sync frontend/ticketgo-web/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html nunca se cachea en el cliente para siempre tener la versión fresca
          aws s3 cp frontend/ticketgo-web/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
