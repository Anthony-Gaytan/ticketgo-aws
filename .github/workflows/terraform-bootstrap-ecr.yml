name: Terraform Bootstrap ECR\n\non:\n  workflow_dispatch:\n\npermissions:\n  id-token: write\n  contents: read\n\nenv:\n  AWS_REGION: us-east-2\n  TF_IN_AUTOMATION: true\n  TF_VAR_aws_account_id: "783111403254"\n\njobs:\n  plan:\n    name: Plan ECR bootstrap\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Setup Terraform\n        uses: hashicorp/setup-terraform@v3\n\n      - name: Configure AWS credentials\n        uses: aws-actions/configure-aws-credentials@v4\n        with:\n          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}\n          aws-region: ${{ env.AWS_REGION }}\n\n      - name: Terraform init\n        run: terraform -chdir=infra/terraform init\n\n      - name: Terraform fmt\n        run: terraform -chdir=infra/terraform fmt -check\n\n      - name: Terraform validate\n        run: terraform -chdir=infra/terraform validate\n\n      - name: Terraform plan ECR only\n        run: terraform -chdir=infra/terraform plan -target=aws_ecr_repository.ticketgo_api -var-file=envs/production.tfvars -out=tfplan\n\n      - name: Upload controlled plan\n        uses: actions/upload-artifact@v4\n        with:\n          name: terraform-bootstrap-ecr-plan\n          path: infra/terraform/tfplan\n\n  apply:\n    name: Apply ECR bootstrap\n    needs: plan\n    runs-on: ubuntu-latest\n    environment: production\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Setup Terraform\n        uses: hashicorp/setup-terraform@v3\n\n      - name: Configure AWS credentials\n        uses: aws-actions/configure-aws-credentials@v4\n        with:\n          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}\n          aws-region: ${{ env.AWS_REGION }}\n\n      - name: Download controlled plan\n        uses: actions/download-artifact@v4\n        with:\n          name: terraform-bootstrap-ecr-plan\n          path: infra/terraform\n\n      - name: Apply controlled plan\n        run: terraform -chdir=infra/terraform apply -auto-approve tfplanname: Terraform Bootstrap ECR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  TF_IN_AUTOMATION: true
  TF_VAR_aws_account_id: "783111403254"

jobs:
  plan:
    name: Plan ECR bootstrap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform -chdir=infra/terraform init

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan ECR only
        run: terraform -chdir=infra/terraform plan -target=aws_ecr_repository.ticketgo_api -var-file=envs/production.tfvars -out=tfplan

      - name: Upload controlled plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-bootstrap-ecr-plan
          path: infra/terraform/tfplan

  apply:
    name: Apply ECR bootstrap
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download controlled plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-bootstrap-ecr-plan
          path: infra/terraform

      - name: Apply controlled plan
        run: terraform -chdir=infra/terraform apply -auto-approve tfplan
